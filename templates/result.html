<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Interview Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-primary text-white text-center">

            <h2>AI Interview Feedback</h2>

        </div>

        <div class="card-body">

            <div class="alert alert-success">

                <h5> Interview Evaluation Completed</h5>

                <p>Your responses have been analyzed by AI.</p>

            </div>

            <h4 class="mb-3">Feedback</h4>

            <div class="border rounded p-3 bg-light">

                <pre style="white-space: pre-wrap; font-family: Arial, sans-serif;">{{ result }}</pre>

            </div>

            <div class="mt-4 text-center">

                <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
                    Dashboard
                </a>

                <a href="{{ url_for('history') }}" class="btn btn-success">
                    Interview History
                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
