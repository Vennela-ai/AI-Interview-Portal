<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Setup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        <h2 class="text-center">🤖 AI Mock Interview Setup</h2>
        <p class="text-center text-muted">
            Configure your interview before getting started.
        </p>

        <hr>

        <form action="/generate-questions" method="POST">

            <!-- Role -->

            <div class="mb-3">

                <label class="form-label">💼 Job Role</label>

                <select class="form-select"
                        id="role"
                        name="role"
                        onchange="updateSkills()"
                        required>

                    <option value="">Select Role</option>

                    <option>Java Developer</option>
                    <option>Python Developer</option>
                    <option>Frontend Developer</option>
                    <option>Backend Developer</option>
                    <option>Full Stack Developer</option>
                    <option>Data Analyst</option>

                </select>

            </div>

            <!-- Experience -->

            <div class="mb-3">

                <label class="form-label">📈 Experience</label>

                <select class="form-select" name="experience">

                    <option>Fresher</option>
                    <option>0-1 Years</option>
                    <option>1-3 Years</option>
                    <option>3-5 Years</option>
                    <option>5+ Years</option>

                </select>

            </div>

            <!-- Skills -->

            <div class="mb-3">

                <label class="form-label">💻 Primary Skill</label>

                <select class="form-select"
                        id="skills"
                        name="skills"
                        required>

                    <option value="">Select Role First</option>

                </select>

            </div>

            <!-- Difficulty -->

            <div class="mb-3">

                <label class="form-label">🎯 Difficulty</label>

                <select class="form-select"
                        name="difficulty">

                    <option>Easy</option>
                    <option selected>Medium</option>
                    <option>Hard</option>

                </select>

            </div>

            <!-- Interview Type -->

            <div class="mb-3">

                <label class="form-label">📝 Interview Type</label>

                <select class="form-select"
                        name="interview_type">

                    <option>Technical</option>
                    <option>HR</option>
                    <option>Behavioral</option>
                    <option>Mixed</option>

                </select>

            </div>

            <!-- Number of Questions -->

            <div class="mb-4">

                <label class="form-label">🔢 Number of Questions</label>

                <select class="form-select"
                        name="question_count">

                    <option>5</option>
                    <option selected>10</option>
                    <option>15</option>

                </select>

            </div>

            <button class="btn btn-primary w-100">
                🚀 Generate AI Questions
            </button>

        </form>

    </div>

</div>

<script>

const skillsData = {

"Java Developer":[
"Java",
"Spring Boot",
"Hibernate",
"JDBC",
"Collections",
"Multithreading",
"Microservices"
],

"Python Developer":[
"Python",
"Flask",
"Django",
"FastAPI",
"Pandas",
"NumPy"
],

"Frontend Developer":[
"HTML",
"CSS",
"JavaScript",
"React",
"Bootstrap",
"Tailwind CSS"
],

"Backend Developer":[
"Node.js",
"Express.js",
"Spring Boot",
"Django",
"REST API"
],

"Full Stack Developer":[
"React",
"Node.js",
"Flask",
"Spring Boot",
"MySQL",
"MongoDB"
],

"Data Analyst":[
"SQL",
"Excel",
"Power BI",
"Tableau",
"Python"
]

};

function updateSkills(){

let role=document.getElementById("role").value;

let skill=document.getElementById("skills");

skill.innerHTML="";

if(skillsData[role]){

skillsData[role].forEach(function(item){

let option=document.createElement("option");

option.value=item;

option.text=item;

skill.appendChild(option);

});

}

}

</script>

</body>
</html>
