<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <div class="camera-box">
    <video id="video" autoplay playsinline muted></video>
</div>

<p id="camera-status"></p>

<p id="warning-count">
    Warnings: <span id="count">0</span>/3
</p>
</head>

<body class="interview-page">

<div class="interview-container">

    <div class="interview-header">

        <div>
            <h2 class="interview-title">🤖 AI Interview Portal</h2>
            <p>Answer all the questions before the timer ends.</p>
        </div>

        <div class="timer" id="timer">
            ⏱ 20:00
        </div>

    </div>

    <form action="/submit_answers" method="POST">

        {% for question in questions %}

        <div class="question-card">

            <h4>Question {{ loop.index }}</h4>

            <p>{{ question }}</p>

            <textarea
                name="answer{{ loop.index }}"
                placeholder="Type your answer here..."
                required></textarea>

        </div>

        {% endfor %}

        <button type="submit" class="submit-btn">
             Submit Interview
        </button>

    </form>

</div>

<script>

let timeLeft = 20 * 60;

const timer = setInterval(function () {

    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("timer").innerHTML =
        "⏱ " + minutes + ":" + String(seconds).padStart(2, "0");

    if (timeLeft <= 0) {
        clearInterval(timer);
        alert("⏰ Time is up! Your interview will be submitted.");
        document.forms[0].submit();
    }

    timeLeft--;

}, 1000);


document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});

document.addEventListener("keydown", function(e){

    if(
        e.ctrlKey &&
        ["c","v","x","a","u","s"].includes(e.key.toLowerCase())
    ){
        e.preventDefault();
        alert("⚠ This action is disabled during the interview.");
    }

});

document.querySelectorAll("textarea").forEach(area => {

    area.addEventListener("paste", function(e){

        e.preventDefault();

        alert("⚠ Pasting answers is not allowed.");

    });

});

document.addEventListener("visibilitychange", function(){

    if(document.hidden){

        alert("⚠ Warning! Do not switch tabs during the interview.");

    }

});
window.onload = function(){

    if(document.documentElement.requestFullscreen){

        document.documentElement.requestFullscreen();

    }

};


window.onbeforeunload = function(){

    return "Leaving this page will end your interview.";

};
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
    video:true
})
.then(stream=>{
    video.srcObject = stream;
    document.getElementById("camera-status").innerHTML =
    " Camera Active";
})
.catch(()=>{
    document.getElementById("camera-status").innerHTML =
    "❌ Camera Permission Denied";
});
let warnings = 0;

function addWarning(message){

    warnings++;

    document.getElementById("count").innerHTML = warnings;

    alert(message);

    if(warnings>=3){

        alert("Interview terminated.");

        document.forms[0].submit();

    }

}

</script>

</body>
</html>
