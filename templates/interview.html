<!DOCTYPE html>
<html>
<head>
    <title>AI Mock Interview</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .timer-box{
            position:sticky;
            top:10px;
            background:white;
            border-radius:10px;
            padding:15px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
            margin-bottom:20px;
            z-index:100;
        }

        #timer{
            font-size:28px;
            font-weight:bold;
            color:#198754;
        }

        .warning{
            color:red !important;
        }

        textarea{
            resize:none;
        }

        .question-card{
            padding:20px;
            border-radius:10px;
            background:white;
            box-shadow:0 0 10px rgba(0,0,0,.08);
            margin-bottom:25px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="timer-box">

        <div class="d-flex justify-content-between align-items-center">

            <h4>🤖 AI Mock Interview</h4>

            <div>

                 Time Left

                <div id="timer">
                    20:00
                </div>

            </div>

        </div>

        <br>

        <div class="progress">

            <div
                class="progress-bar progress-bar-striped progress-bar-animated"
                id="progressBar"
                style="width:0%">
            </div>

        </div>

        <small id="progressText">
            Question 1 of {{ questions|length }}
        </small>

    </div>


    <form id="interviewForm" method="POST" action="/submit-interview">

        {% for question in questions %}

        <div class="question-card">

            <h5>{{ loop.index }}. {{ question }}</h5>

            <textarea
                class="form-control answer-box"
                name="answer{{ loop.index }}"
                rows="4"
                placeholder="Type your answer here..."
                required></textarea>

            <input
                type="hidden"
                name="question{{ loop.index }}"
                value="{{ question }}">

        </div>

        {% endfor %}

        <button class="btn btn-success btn-lg">
            Submit Interview
        </button>

        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-lg">
            Back
        </a>

    </form>

</div>

<script>

let totalTime = 20 * 60;

const timer = document.getElementById("timer");

const form = document.getElementById("interviewForm");

function startTimer(){

    const interval = setInterval(function(){

        let minutes = Math.floor(totalTime/60);

        let seconds = totalTime%60;

        timer.innerHTML =
            String(minutes).padStart(2,'0')
            + ":"
            +
            String(seconds).padStart(2,'0');

        if(totalTime<=300){
            timer.classList.add("warning");
        }

        if(totalTime<=0){

            clearInterval(interval);

            alert("Time is up! Interview will be submitted.");

            form.submit();

        }

        totalTime--;

    },1000);

}

startTimer();


const answers=document.querySelectorAll(".answer-box");

const progress=document.getElementById("progressBar");

const progressText=document.getElementById("progressText");

answers.forEach((box,index)=>{

    box.addEventListener("focus",function(){

        let current=index+1;

        let percent=(current/answers.length)*100;

        progress.style.width=percent+"%";

        progressText.innerHTML=
        "Question "+current+" of "+answers.length;

    });

});

</script>

</body>
</html>
