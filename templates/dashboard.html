<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="dashboard-page">

<div class="container py-5">

    <div class="dashboard-card">

        <h1 class="text-center">🤖 AI Mock Interview Portal</h1>

        <p class="text-center text-muted">
            Welcome back! Ready for your next interview?
        </p>

        <hr>

        <div class="row text-center mt-4">

            <div class="col-md-4 mb-3">

                <div class="stat-card">

                    <h2>🎯</h2>

                    <h5>Start Interview</h5>

                    <a href="{{ url_for('interview_setup') }}" class="btn btn-success">
                        Start
                    </a>

                </div>

            </div>

            <div class="col-md-4 mb-3">

                <div class="stat-card">

                    <h2>📜</h2>

                    <h5>Interview History</h5>

                    <a href="{{ url_for('history') }}" class="btn btn-primary">
                        View
                    </a>

                </div>

            </div>

            <div class="col-md-4 mb-3">

                <div class="stat-card">

                    <h2>👤</h2>

                    <h5>My Profile</h5>

                    <a href="{{ url_for('profile') }}" class="btn btn-info">
                        Profile
                    </a>

                </div>

            </div>

        </div>

        <div class="text-center mt-4">

            <a href="{{ url_for('logout') }}" class="btn btn-danger btn-lg">
                Logout
            </a>

        </div>

    </div>

</div>

</body>

</html>
